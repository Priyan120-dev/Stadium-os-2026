<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="route-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b0ff" />
      <stop offset="100%" stop-color="#00e676" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Radar sweep / concentric rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#00b0ff" stroke-width="1" stroke-dasharray="3,6" opacity="0.3" />
  <circle cx="50" cy="50" r="38" fill="none" stroke="#00b0ff" stroke-width="1.5" opacity="0.15" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00b0ff" stroke-width="1" stroke-dasharray="20,4,4,4" opacity="0.4" />
  
  <!-- Outer Stadium Rim -->
  <path d="M 24 50 A 26 18 0 1 1 76 50 A 26 18 0 1 1 24 50" fill="none" stroke="#00b0ff" stroke-width="3" stroke-linecap="round" opacity="0.85" filter="url(#glow)" />
  
  <!-- Inner Stadium seating tiers / segments -->
  <path d="M 30 50 A 20 13 0 0 1 70 50" fill="none" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7" />
  <path d="M 30 50 A 20 13 0 0 0 70 50" fill="none" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7" />
  
  <!-- Center Pitch -->
  <ellipse cx="50" cy="50" rx="14" ry="9" fill="#050811" stroke="#00e676" stroke-width="1.5" opacity="0.9" />
  <line x1="50" y1="41" x2="50" y2="59" stroke="#00e676" stroke-width="1" opacity="0.6" />
  <circle cx="50" cy="50" r="2.5" fill="none" stroke="#00e676" stroke-width="1" opacity="0.6" />

  <!-- Dynamic Route Path (glowing overlay curve) -->
  <path d="M 50 50 Q 52 32 72 24" fill="none" stroke="url(#route-grad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 50 50 Q 52 32 72 24" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.6" />

  <!-- Gold Beacon Node (Accent) -->
  <circle cx="72" cy="24" r="3.5" fill="#ffd700" filter="url(#glow)" />
  <circle cx="72" cy="24" r="1.5" fill="#ffffff" />
  
  <!-- Central Pulse Dot -->
  <circle cx="50" cy="50" r="2" fill="#ffd700" />
</svg>
