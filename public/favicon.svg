      <stop offset="0%" stop-color="#00b0ff" />
      <stop offset="100%" stop-color="#00e676" />
    </linearGradient>
  </defs>
  <!-- Outer Stadium Rim -->
  <ellipse cx="16" cy="16" rx="12" ry="8" fill="none" stroke="#00b0ff" stroke-width="2" opacity="0.9" />
